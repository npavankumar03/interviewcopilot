  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U copilot"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Redis for caching and rate limiting (optional)
